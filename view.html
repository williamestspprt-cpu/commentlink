<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ready Comment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
      padding: 20px;
      margin: 0;
    }

    h2 {
      margin-bottom: 10px;
    }

    textarea {
      width: 95%;
      height: 100px;
      margin-top: 15px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
    }

    button, a {
      display: block;
      margin: 15px auto;
      padding: 12px;
      width: 220px;
      border-radius: 10px;
      text-decoration: none;
      border: none;
      font-size: 15px;
      cursor: pointer;
    }

    .copy {
      background: #08d9d6;
      color: black;
    }

    .open {
      background: #ff2e63;
      color: white;
    }
  </style>
</head>
<body>

<h2>Your Comment is Ready ✨</h2>

<textarea id="commentBox" readonly></textarea>

<button class="copy" onclick="copyComment()">Copy Comment</button>

<a id="openPost" class="open" target="_blank">Open Instagram Post</a>

<script>
const params = new URLSearchParams(window.location.search);

const post = params.get("post") ? decodeURIComponent(params.get("post")) : "";
const comment = params.get("comment") ? decodeURIComponent(params.get("comment")) : "";

document.getElementById("commentBox").value = comment;
document.getElementById("openPost").href = post;

function copyComment() {
  navigator.clipboard.writeText(comment)
    .then(() => alert("Copied!"))
    .catch(() => alert("Copy failed. Please copy manually."));
}
</script>

</body>
</html>
